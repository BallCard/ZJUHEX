name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.10'

jobs:
  # Job 1: Lint and Type Check
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend_new

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend_new/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

  # Job 2: Build Frontend
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: src/frontend_new

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend_new/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend_new/dist
          retention-days: 7

  # Job 3: Python Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests
        run: |
          source venv/bin/activate
          pytest tests/ -v --tb=short

  # Job 4: Deploy to Pages (Frontend Only)
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Job 5: Auto Test after Deploy
  post-deploy-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-frontend
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run smoke test
        run: |
          npm install -g playwright
          npx playwright install chromium --with-deps

          # Wait for deployment
          sleep 30

          # Test the deployed site
          node -e "
            const https = require('https');
            const url = process.env.DEPLOYED_URL || 'https://BallCard.github.io/ZJUHEX';

            https.get(url, (res) => {
              console.log('Status:', res.statusCode);
              if (res.statusCode === 200) {
                console.log('✅ Site is accessible');
                process.exit(0);
              } else {
                console.log('❌ Site returned:', res.statusCode);
                process.exit(1);
              }
            }).on('error', (e) => {
              console.error('❌ Connection failed:', e.message);
              process.exit(1);
            });
          "
        env:
          DEPLOYED_URL: ${{ needs.deploy-frontend.outputs.page_url }}

  # Job 6: E2E Test (Optional - runs on schedule)
  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: src/frontend_new

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend_new/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run dev server
        run: npm run dev &
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Wait for server
        run: sleep 10

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/