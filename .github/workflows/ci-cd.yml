name: CI/CD Pipeline

on:
  push:
    branches: [main, master, feature/ci-cd-auto-deploy]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly Sunday midnight

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.10'

jobs:
  # Job 1: Lint and Type Check
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend_new

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend_new/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

  # Job 2: Build Frontend
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: src/frontend_new

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend_new/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend_new/dist
          retention-days: 7

  # Job 3: Python Backend Tests
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_e2e.py --ignore=tests/test_integration_async.py -x || true

  # Job 4: Deploy to Pages (Frontend Only)
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Job 5: Auto Test after Deploy
  post-deploy-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-frontend
    timeout-minutes: 5

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Smoke test deployed site
        run: |
          DEPLOYED_URL="${{ needs.deploy-frontend.outputs.page_url }}"
          echo "Testing: $DEPLOYED_URL"

          # Simple HTTP check via curl
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOYED_URL" || echo "000")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Site is accessible (HTTP $HTTP_CODE)"
            exit 0
          else
            echo "❌ Site returned HTTP $HTTP_CODE"
            exit 1
          fi

  # Job 6: E2E Test (Optional - runs on schedule or manual trigger)
  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: src/frontend_new

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/frontend_new/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: src/frontend_new/test-results/
