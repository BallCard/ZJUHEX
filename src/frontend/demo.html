<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱整合系统 - 演示模式</title>
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-unit {
            font-size: 14px;
            opacity: 0.8;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            height: calc(100vh - 280px);
        }

        .graph-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        #cy {
            flex: 1;
            border-radius: 12px;
            background: #fafafa;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .info-section {
            margin-bottom: 25px;
        }

        .info-section h3 {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .info-item {
            margin-bottom: 15px;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            line-height: 1.6;
            font-size: 14px;
        }

        .node-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
        }

        .badge-concept {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-person {
            background: #fce4ec;
            color: #c2185b;
        }

        .badge-organization {
            background: #e8f5e9;
            color: #388e3c;
        }

        .legend {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .demo-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 知识图谱整合系统 <span class="demo-badge">演示模式</span></h1>
            <div class="subtitle">AI全栈黑客松 - 学科知识整合智能体 | 生理学教材演示</div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">知识节点</div>
                    <div class="stat-value" id="nodeCount">-</div>
                    <div class="stat-unit">个概念</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">知识关系</div>
                    <div class="stat-value" id="edgeCount">-</div>
                    <div class="stat-unit">条连接</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">压缩比</div>
                    <div class="stat-value">0.78%</div>
                    <div class="stat-unit">≤30% 达标</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">去重率</div>
                    <div class="stat-value">9.88%</div>
                    <div class="stat-unit">语义合并</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="graph-panel">
                <div class="panel-header">
                    <div class="panel-title">📊 知识图谱可视化</div>
                    <div class="controls">
                        <button class="btn" onclick="cy.fit()">🔍 适应画布</button>
                        <button class="btn" onclick="cy.center()">🎯 居中</button>
                        <button class="btn" onclick="resetLayout()">🔄 重新布局</button>
                    </div>
                </div>
                <div id="cy"></div>
            </div>

            <div class="sidebar">
                <div id="defaultInfo">
                    <div class="info-section">
                        <h3>💡 使用说明</h3>
                        <div class="info-value">
                            • 点击节点查看详细信息<br>
                            • 拖拽节点调整位置<br>
                            • 滚轮缩放画布<br>
                            • 拖拽空白区域平移<br>
                            • 双击节点高亮相邻节点
                        </div>
                    </div>

                    <div class="info-section">
                        <h3>🎨 节点类型</h3>
                        <div class="legend">
                            <div class="legend-item">
                                <div class="legend-color" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                                <span>概念节点</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
                                <span>人物节点</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
                                <span>机构节点</span>
                            </div>
                        </div>
                    </div>

                    <div class="info-section">
                        <h3>📈 演示数据</h3>
                        <div class="info-value">
                            教材：03_生理学.pdf<br>
                            处理：前10个文档块<br>
                            提取：162个原始节点<br>
                            去重：146个整合节点
                        </div>
                    </div>
                </div>

                <div id="nodeInfo" class="hidden">
                    <div class="info-section">
                        <h3>📋 节点详情</h3>
                        <div class="info-item">
                            <div class="info-label">名称</div>
                            <div class="info-value" id="nodeName">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">类型</div>
                            <div class="info-value" id="nodeType">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">定义</div>
                            <div class="info-value" id="nodeDefinition">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">来源文档块</div>
                            <div class="info-value" id="nodeSource">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">连接数</div>
                            <div class="info-value" id="nodeConnections">-</div>
                        </div>
                        <div class="info-item">
                            <button class="btn" onclick="showDefaultInfo()" style="width: 100%;">← 返回</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cy;

        function showDefaultInfo() {
            document.getElementById('defaultInfo').classList.remove('hidden');
            document.getElementById('nodeInfo').classList.add('hidden');
        }

        function showNodeInfo() {
            document.getElementById('defaultInfo').classList.add('hidden');
            document.getElementById('nodeInfo').classList.remove('hidden');
        }

        function resetLayout() {
            cy.layout({
                name: 'cose',
                animate: true,
                animationDuration: 1000,
                nodeRepulsion: 8000,
                idealEdgeLength: 100,
                edgeElasticity: 100
            }).run();
        }

        // Load demo data
        fetch('./demo_data.json')
            .then(response => response.json())
            .then(data => {
                // Update stats
                document.getElementById('nodeCount').textContent = data.nodes.length;
                document.getElementById('edgeCount').textContent = data.edges.length;

                // Convert to Cytoscape format
                const elements = [];

                // Add nodes
                data.nodes.forEach(node => {
                    elements.push({
                        data: {
                            id: node.id,
                            label: node.label,
                            type: node.type,
                            definition: node.definition,
                            source_chunks: node.source_chunks || []
                        }
                    });
                });

                // Add edges
                data.edges.forEach((edge, i) => {
                    elements.push({
                        data: {
                            id: edge.id || `edge_${i}`,
                            source: edge.source,
                            target: edge.target,
                            relation: edge.relation,
                            description: edge.description || ''
                        }
                    });
                });

                // Initialize Cytoscape
                cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: elements,
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'background-color': function(ele) {
                                    const type = ele.data('type');
                                    if (type === 'person') return '#f093fb';
                                    if (type === 'organization') return '#4facfe';
                                    return '#667eea';
                                },
                                'background-image': function(ele) {
                                    const type = ele.data('type');
                                    if (type === 'person') return 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                                    if (type === 'organization') return 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                                    return 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                                },
                                'label': 'data(label)',
                                'color': '#fff',
                                'text-valign': 'center',
                                'text-halign': 'center',
                                'font-size': '14px',
                                'font-weight': '600',
                                'text-outline-width': 2,
                                'text-outline-color': function(ele) {
                                    const type = ele.data('type');
                                    if (type === 'person') return '#f093fb';
                                    if (type === 'organization') return '#4facfe';
                                    return '#667eea';
                                },
                                'width': function(ele) {
                                    return Math.min(ele.data('label').length * 10 + 30, 120);
                                },
                                'height': function(ele) {
                                    return Math.min(ele.data('label').length * 10 + 30, 120);
                                },
                                'text-wrap': 'wrap',
                                'text-max-width': '100px'
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 3,
                                'line-color': '#ddd',
                                'target-arrow-color': '#ddd',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier',
                                'label': 'data(relation)',
                                'font-size': '11px',
                                'color': '#666',
                                'text-rotation': 'autorotate',
                                'text-margin-y': -12,
                                'text-background-color': '#fff',
                                'text-background-opacity': 0.8,
                                'text-background-padding': '3px'
                            }
                        },
                        {
                            selector: 'node:selected',
                            style: {
                                'border-width': 4,
                                'border-color': '#ff6b6b',
                                'box-shadow': '0 0 20px #ff6b6b'
                            }
                        },
                        {
                            selector: '.highlighted',
                            style: {
                                'border-width': 4,
                                'border-color': '#ffd93d',
                                'z-index': 999
                            }
                        },
                        {
                            selector: '.dimmed',
                            style: {
                                'opacity': 0.3
                            }
                        }
                    ],
                    layout: {
                        name: 'cose',
                        animate: true,
                        animationDuration: 1000,
                        nodeRepulsion: 10000,
                        idealEdgeLength: 120,
                        edgeElasticity: 100,
                        nestingFactor: 5,
                        gravity: 80,
                        numIter: 1000,
                        initialTemp: 200,
                        coolingFactor: 0.95,
                        minTemp: 1.0
                    }
                });

                // Node click handler
                cy.on('tap', 'node', function(evt) {
                    const node = evt.target;
                    const data = node.data();

                    showNodeInfo();

                    document.getElementById('nodeName').textContent = data.label;

                    const typeMap = {
                        'concept': '概念',
                        'person': '人物',
                        'organization': '机构'
                    };
                    const typeBadgeClass = {
                        'concept': 'badge-concept',
                        'person': 'badge-person',
                        'organization': 'badge-organization'
                    };
                    document.getElementById('nodeType').innerHTML =
                        `<span class="node-badge ${typeBadgeClass[data.type] || 'badge-concept'}">${typeMap[data.type] || data.type}</span>`;

                    document.getElementById('nodeDefinition').textContent = data.definition || '无定义';
                    document.getElementById('nodeSource').textContent =
                        data.source_chunks.length > 0 ? data.source_chunks.join(', ') : '未知';
                    document.getElementById('nodeConnections').textContent =
                        node.connectedEdges().length + ' 个连接';
                });

                // Double click to highlight neighbors
                cy.on('dbltap', 'node', function(evt) {
                    const node = evt.target;
                    const neighbors = node.neighborhood();

                    cy.elements().addClass('dimmed');
                    node.removeClass('dimmed').addClass('highlighted');
                    neighbors.removeClass('dimmed').addClass('highlighted');
                });

                // Click on background
                cy.on('tap', function(evt) {
                    if (evt.target === cy) {
                        showDefaultInfo();
                        cy.elements().removeClass('dimmed highlighted');
                    }
                });

                console.log('✅ Demo loaded:', data.nodes.length, 'nodes,', data.edges.length, 'edges');
            })
            .catch(error => {
                console.error('❌ Error loading demo data:', error);
                alert('加载演示数据失败');
            });
    </script>
</body>
</html>
